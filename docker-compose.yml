version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: produtos_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: produtos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - produtos_network

volumes:
  postgres_data:

networks:
  produtos_network:
    driver: bridge
